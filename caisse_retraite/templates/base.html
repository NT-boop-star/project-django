<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Caisse de Retraite</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        nav { background: #f4f4f4; padding: 1em; margin-bottom: 1em; overflow: hidden; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 960px; margin: auto; }
        .user-info { float: right; }
        .user-info form { display: inline; }
        .user-info button {
            background: none;
            border: none;
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font: inherit;
            padding: 0;
        }
        .user-info button:hover { color: #004499; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'gestion:adherent_list' %}">Accueil - Liste des Adhérents</a>
            
            <!-- UN SEUL bloc user-info avec UN SEUL bouton de déconnexion -->
            <div class="user-info">
                {% if user.is_authenticated %}
                    Bonjour, {{ user.username }} |
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit">Déconnexion</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Connexion</a>
                {% endif %}
            </div>
        </nav>

        <h1>{% block title %}Portail de Gestion{% endblock %}</h1>

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
